<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="prism-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2d75;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="prism-blue" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background glow layers -->
  <path d="M30 20 L55 65 L80 20 Z" fill="url(#prism-pink)" transform="translate(-2, 0)" opacity="0.6" filter="blur(2px)" />
  <path d="M30 20 L55 65 L80 20 Z" fill="url(#prism-blue)" transform="translate(2, 0)" opacity="0.6" filter="blur(2px)" />
  <!-- Main VJ-like triangular shape -->
  <path d="M30 20 L55 65 L80 20 Z" fill="white" stroke="white" stroke-width="1" />
</svg>
